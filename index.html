<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>We have fun!</title>
    <!-- For production use the corresponding *.min.css versions. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.css" rel="stylesheet" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body::before {
            content: "xs";
            color: red;
            font-size: 2rem;
            font-weight: bold;
            position: fixed;
            top: 14px;
            right: 17px;
        }
        @media (min-width: 576px) {
            body::before {
                content: "sm";
            }
        }
        @media (min-width: 768px) {
            body::before {
                content: "md";
            }
        }
        @media (min-width: 992px) {
            body::before {
                content: "lg";
            }
        }
        @media (min-width: 1200px) {
            body::before {
                content: "xl";
            }
        }
        @media (min-width: 1400px) {
            body::before {
                content: "xxl";
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="display-1">We will have fun!</div>
    </div>

    <!-- Always place this before the body closing tag.
         For production use the corresponding *.min.js version. -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/js/bootstrap.bundle.js" crossorigin="anonymous"></script>
</body>
</html>
